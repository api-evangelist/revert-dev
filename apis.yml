aid: revert-dev
url: https://raw.githubusercontent.com/api-evangelist/revert-dev/refs/heads/main/apis.yml
name: Revert
kind: company
description: Revert is an open-source unified API for building product integrations.
  A single normalized interface fronts many third-party SaaS providers across categories
  like CRM, with managed OAuth connections, a unified data model (contacts, leads,
  deals, companies, notes, tasks, events, users), a passthrough proxy for provider-specific
  calls, and webhooks. Revert is AGPL-3.0 licensed and self-hostable, with a hosted
  cloud offering.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Unified API
- Integrations
- CRM
- iPaaS
- Open Source
- OAuth
created: '2026-07-01'
modified: '2026-07-01'
specificationVersion: '0.19'
